# frontend/nginx.conf
#
# Slice:  P00-S02-T001 — Docker compose services
# Phase:  P00 Scaffold + Design System
# Source: frontend/Dockerfile — nginx runtime stage
#
# Minimal nginx server block for React SPA:
#   - Serves static files from /usr/share/nginx/html (the Vite dist/).
#   - `try_files $uri /index.html` handles client-side React Router routes
#     (any path not matching a file falls back to index.html).
#   - Port 80 (EXPOSE 80 in Dockerfile; mapped to host 5173 in compose).
#
# Security headers are intentionally minimal here; production hardening
# (HSTS, CSP, X-Frame-Options, etc.) is deferred to P04 Harden phase
# per 01-non-negotiables.md §Security.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: serve index.html for any path not matching a static file.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable nginx version in Server header (minimal security hardening).
    server_tokens off;

    # Cache static assets with hash in filename (Vite default output).
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Health probe for docker compose healthcheck (optional).
    location /nginx-health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
