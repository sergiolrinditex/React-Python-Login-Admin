# infra/nginx/default.conf — Nginx configuration for Hilo People frontend
#
# Slice: P00-S02-T001 — Docker compose services (Rancher-ready)
# Phase: P00 — Scaffold + Design System
#
# Used by: frontend/Dockerfile runtime stage (nginx-unprivileged:1.29-alpine)
# Mounted at: /etc/nginx/conf.d/default.conf inside the frontend container
#
# Features:
#   - Listens on port 8080 (nginx-unprivileged cannot bind <1024 as non-root)
#   - SPA fallback: try_files $uri /index.html (React Router client-side routing)
#   - Reverse proxy: /api/v1/ → backend service (Docker Compose service hostname)
#   - Logs to stdout/stderr (Rancher/K8s 12-factor compliance)
#   - Security headers (HSTS, X-Content-Type-Options, X-Frame-Options, CSP)
#   - Gzip enabled for static assets
#
# RANCHER NOTE: In Kubernetes, the /api/v1 proxy is handled by the Ingress
# controller (path-based routing). This nginx proxy is dev-convenience only.
# In production Helm chart (P06), the frontend deployment will NOT proxy to backend.

server {
    listen 8080;
    server_name _;

    # Serve Vite production build from nginx html root
    root /usr/share/nginx/html;
    index index.html;

    # ── Logs to stdout/stderr (K8s/Rancher 12-factor) ──────────────────────
    access_log /dev/stdout;
    error_log /dev/stderr warn;

    # ── Gzip compression for static assets ──────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    # HSTS: enable only when HTTPS is confirmed (P05 hardening slice)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Reverse proxy: /api/v1 → backend service ─────────────────────────────
    # In K8s production: this block is removed; Ingress routes /api/v1 directly.
    location /api/v1/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Forward request ID for end-to-end traceability (TECHNICAL_GUIDE §7 + non-negotiables)
        proxy_set_header X-Request-ID $http_x_request_id;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── Static asset caching ─────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA fallback: all unmatched routes → index.html ─────────────────────
    # Required for React Router client-side routing (BrowserRouter / createBrowserRouter)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
