# .pre-commit-config.yaml — Local guard hooks
#
# Slice: P00-S02-T015 — bash -n .env.example regression guard
# Phase: P00 — Scaffold + Design System (hardening follow-up)
# Origin: FU-20260510095809 (severity low, kind test)
#
# Purpose: Catches shell-metacharacter regressions (<, >, |, unquoted spaces)
#   in .env.example before the commit is recorded, so 'set -a; source .env; set +a'
#   never breaks on a fresh clone.
#
# Install (one-time per clone):
#   pip install pre-commit && pre-commit install
#
# Bypass (debugging only — NEVER on main):
#   git commit --no-verify
#
# CI gate (unconditional, no --no-verify escape):
#   .github/workflows/env-example-lint.yml
#
# Design decisions:
#   D1 — repo: local (no external hook repo pulled). bash is available on
#        every dev machine; no transitive dependency needed.
#   D2 — files: ^\.env\.example$ (anchored). Does NOT match frontend/.env.example
#        or any nested variant. Future slices can extend.
#   D3 — pass_filenames: false. entry already cites the file explicitly;
#        without this flag pre-commit would pass the staged filename as an
#        extra argument, producing 'bash -n .env.example .env.example' (error).

repos:
  - repo: local
    hooks:
      - id: env-example-bash-syntax
        name: "bash -n .env.example (lint shell-syntax of env template)"
        entry: bash -n .env.example
        language: system
        files: ^\.env\.example$
        pass_filenames: false
        description: >
          Catches shell-metacharacter regressions (<, >, |, unquoted spaces)
          in .env.example before merge so 'set -a; source .env; set +a' never
          breaks on a fresh clone.
