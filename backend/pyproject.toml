# backend/pyproject.toml
# Hilo People backend — full production dependency manifest.
#
# Slice: P00-S01-T003 — Backend dependency pack
# Phase: P00 — Scaffold + Design System
#
# Versions pinned to current stable on 2026-05-08 (verified against PyPI live).
# Researcher confirmation: official-doc-notes/P00-S01-T003-backend-deps.md.
# Real install/compat verification: pip install -e ".[dev]" + dependency_smoke.
#
# Dependency limit target: ≤25 runtime, ≤10 dev (non-negotiables §Dependencies).

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "hilo-people-backend"
version = "0.0.0"
description = "Hilo People — internal AI-powered HR assistant backend"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    # --- Web framework ---
    "fastapi==0.136.1",
    "uvicorn[standard]==0.46.0",
    "python-multipart==0.0.27",   # FastAPI form/file parsing
    "itsdangerous==2.2.0",        # signed cookies (BFF pattern)

    # --- ORM + DB ---
    "sqlalchemy[asyncio]==2.0.49",
    "alembic==1.18.4",
    "asyncpg==0.31.0",            # async PostgreSQL driver

    # --- Pydantic ---
    # NOTE: pydantic pinned to 2.12.5 to satisfy litellm==1.83.14 strict constraint.
    # litellm 1.83.14 requires pydantic==2.12.5 exactly. pydantic-settings 2.14.1
    # is compatible with pydantic>=2.7.0, so it works with 2.12.5.
    # email-validator added in P01-S02-T001: required by pydantic[email]/EmailStr.
    # pydantic v2 docs: EmailStr requires 'pip install pydantic[email]' (email-validator>=2.0.0).
    # It is NOT a transitive dep of pydantic core — must be explicit. official-doc-note 2026-05-10.
    "pydantic==2.12.5",
    "pydantic-settings==2.14.1",
    "email-validator==2.2.0",

    # --- Auth / security ---
    "argon2-cffi==25.1.0",        # Argon2 password hashing
    "pyjwt[crypto]==2.12.1",      # JWT (own implementation — no Clerk/Auth0)
    "cryptography==48.0.0",       # Fernet for credential cipher (§10.2)
    # TOTP + QR code generation (P01-S02-T009 MFA enrollment)
    # pyotp: TOTP secret generation + provisioning_uri. 2.9.0 is latest stable (2026-05).
    # qrcode[pil]: QR PNG generation; Pillow dependency (~5MB). No native-code build.
    # WRITE_SET_DRIFT: these were not in the original write_set but are mandatory deps
    # for the endpoint (same precedent as email-validator==2.2.0 in T001).
    "pyotp==2.9.0",
    "qrcode[pil]==8.2",

    # --- HTTP client (runtime) ---
    "httpx==0.28.1",              # LiteLLM client + Resend HTTP + tests

    # --- Document parsing ---
    "pypdf==6.10.2",
    "python-docx==1.2.0",

    # --- Queue / cache ---
    # NOTE: redis pinned to 6.4.0 (latest compatible with celery==5.6.3).
    # celery 5.6.3 uses kombu 5.6.x which requires redis<6.5; redis 7.x is
    # incompatible. redis-py 6.4.0 is the latest satisfying kombu's constraint.
    "celery[redis]==5.6.3",
    "redis==6.4.0",

    # --- Email ---
    "resend==2.30.0",

    # --- Observability ---
    "structlog==25.5.0",
    "prometheus-client==0.25.0",

    # --- Storage ---
    "boto3==1.43.6",

    # --- PostgreSQL vector binding (Python side; PG extension via migration) ---
    "pgvector==0.4.2",

    # --- AI gateway ---
    "litellm==1.83.14",

    # --- RAG / LangChain ---
    "langchain==1.2.18",
    "langchain-core==1.3.3",
    "langchain-community==0.4.1",
    "langchain-text-splitters==1.1.2",

    # --- LangGraph ---
    "langgraph==1.1.10",

    # --- DeepAgents ---
    "deepagents==0.5.7",

    # --- MCP Python SDK (official: modelcontextprotocol/python-sdk) ---
    "mcp==1.27.1",

    # --- Token counting ---
    "tiktoken==0.12.0",
]

[project.optional-dependencies]
dev = [
    "ruff==0.15.12",
    "mypy==2.0.0",
    "pytest==9.0.3",
    "pytest-asyncio==1.3.0",
    "pytest-cov==7.1.0",
]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "C4", "SIM"]
ignore = ["B008", "PLW0603", "ANN401"]

[tool.mypy]
python_version = "3.11"
strict = false
ignore_missing_imports = true

[tool.hatch.build.targets.wheel]
packages = ["app"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
