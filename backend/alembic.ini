# alembic.ini
#
# Slice:  P00-S02-T003 — Verification data loader and reset
# Phase:  P00 Scaffold + Design System
# Purpose: Alembic configuration for Hilo People backend. The database URL is
#          injected at runtime by alembic/env.py from the DATABASE_URL environment
#          variable (never hardcoded here). The versions/ directory starts empty;
#          P01-S01-T001 adds the first auth/profile/audit migration.
#
# Source: STACK_PROFILE.yaml db.migrate_cmd: alembic upgrade head
#         docs/source-of-truth/HILO_PEOPLE_TECHNICAL_GUIDE.md §4 structure

[alembic]
# Path to migration scripts, relative to this file (backend/).
script_location = alembic

# Template used to generate migration files.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(slug)s

# sys.path prepend for env.py to find app package.
prepend_sys_path = .

# Logging configuration — respect ENABLE_VERBOSE_LOGGING env (handled in env.py).
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
