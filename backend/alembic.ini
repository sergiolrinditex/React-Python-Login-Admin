# Alembic configuration for Hilo People backend.
#
# Slice: P01-S01-T001 — DB auth baseline
# Phase: P01 — Auth + base capabilities
#
# The DATABASE_URL is read from the environment via env.py / pydantic Settings.
# The sqlalchemy.url field is intentionally left blank here — env.py reads the
# URL from app.core.config.get_settings().database_url (SecretStr).
# This keeps secrets out of INI files (HILO_PEOPLE_TECHNICAL_GUIDE.md §11.1,
# 01-non-negotiables.md §Security).

[alembic]
# Blank intentionally — env.py provides the URL from pydantic settings.
sqlalchemy.url =

# Alembic migrations directory (relative to this ini file location).
script_location = alembic

# Revision file template
file_template = %%(rev)s_%%(slug)s

# Timezone used in generated file names.
timezone = UTC

# sys.path prepend — leave empty; app/ is installed via `pip install -e .`
prepend_sys_path = .

# Alembic generates a `version_path_separator` for multi-version repos.
version_path_separator = os

[post_write_hooks]
# No post-write hooks configured for T001.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
