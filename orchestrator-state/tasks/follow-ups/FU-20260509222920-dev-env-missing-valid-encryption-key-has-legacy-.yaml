  "title": "Dev .env missing valid ENCRYPTION_KEY (has legacy PROVIDER_ENCRYPTION_KEY=dev-encryption-key-placeholder)",
  "description": "P01-S01-T002 renamed PROVIDER_ENCRYPTION_KEY → ENCRYPTION_KEY in .env.example and config.py but the actual dev .env was never updated and still carries the legacy name with the placeholder string 'dev-encryption-key-placeholder' which is NOT a valid Fernet base64 key. Two real failures observed during /verify-slice P00-S02-T006: (a) bootstrap_verification_data --only auth fails immediately with 'ENCRYPTION_KEY env var is required for MFA TOTP encryption' and the dev-restart.sh wrapper warns but continues, leaving auth (and admin_ai) un-seeded; (b) any live POST /api/v1/admin/ai/providers/{id}/discover-models returns 502 CryptoError because Fernet construction with an invalid base64 key fails on first decrypt. Both were observed live with hard reset. Mitigation during verify was an exported Fernet key for that single shell. Persistent fix: update dev .env + setup-from-scratch.sh to generate or carry a real Fernet key under the canonical name.",
