  "title": "Backend/infra: configure cross-origin between frontend (:5173) and backend (:8000) — vite proxy or CORSMiddleware",
  "description": "From the browser, every cross-origin XHR from http://localhost:5173 to http://localhost:8000 fails the CORS preflight: OPTIONS /api/v1/auth/refresh → 405 Method Not Allowed (no OPTIONS handler, no CORSMiddleware registered). frontend/vite.config.ts has no server.proxy block. As a result, AuthProvider.hydrate's POST /api/v1/auth/refresh on every protected-route mount is rejected by the browser with net::ERR_FAILED (caught by the auth code as a session-expired fallback, which is correct defensive behavior, but blocks all positive end-to-end auth flows from a real browser). All three contractually consumed endpoints by T001 (POST /auth/refresh, GET /users/me, POST /auth/logout) are equally blocked. This will block P03-S01-T001 SignInPage immediately when its form submits POST /api/v1/auth/sign-in. TECHNICAL_GUIDE has no spec for cross-origin or reverse proxy. STACK_PROFILE declares :5173 frontend and :8000 backend on different origins without a documented bridge.\\n\\nObserved during /verify-slice P01-S03-T001:\\n  - F1, F2 (redirect-to-sign-in flows) PASS — they happen client-side without backend.\\n  - F6 (token-storage invariant) PASS — code never touches storage.\\n  - F7 (open-redirect smoke on stub) PASS — stub is read-only.\\n  - F3, F4, F5 (sign-in → /me → logout) BLOCKED — cannot reproduce in browser without same-origin or CORS.",
