    "why_not_debugger": "CORS configuration is outside T001's Write set (frontend/src/features/auth/** + frontend/src/app/router.tsx). The two clean fixes both live elsewhere: (a) frontend/vite.config.ts server.proxy reverse-proxying /api → http://localhost:8000 (recommended; same pattern as nginx/cloudfront in prod, BFF-style same-origin); (b) backend/app/main.py registering CORSMiddleware(allow_origins=['http://localhost:5173'], allow_credentials=true, allow_headers=['authorization','content-type','x-request-id'], allow_methods=['GET','POST','PATCH','PUT','DELETE','OPTIONS']). Either path requires Write set expansion outside T001 plus a TECHNICAL_GUIDE amendment to spec the cross-origin / reverse-proxy strategy. Debugger inside T001 cannot legitimately touch any of these paths without violating Write set discipline. T001 is the slice that EXPOSES the gap (first frontend slice making cross-origin XHR from a real browser); it does not introduce the gap.",
