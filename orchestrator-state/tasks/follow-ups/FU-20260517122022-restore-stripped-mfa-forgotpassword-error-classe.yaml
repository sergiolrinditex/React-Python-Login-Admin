  "description": "Commit 4a75d15 (P04-S01-T001 AdminDashboardPage, merged PR #38, 2026-05-16) deleted lines 252..450 of frontend/src/features/auth/data/errors.ts, removing 8 error classes added by 21859a4 (P03-S01-T005): MfaChallengeExpiredError, MfaCodeInvalidError, MfaVerifyRateLimitedError, MfaInvalidPayloadError, MfaVerifyInternalError, ForgotPasswordValidationError, ForgotPasswordRateLimitedError, ForgotPasswordInternalError. Consumers (useVerifyMfa.ts, useForgotPassword.ts, TwoFactorPage.tsx, ForgotPasswordPage.tsx, twoFactorHelpers.ts) still import them, so Vite throws 'SyntaxError: requested module does not provide an export named MfaChallengeExpiredError' at /src/features/auth/index.ts evaluation, blocking the entire React app from mounting. Confirmed via Chrome DevTools MCP during /verify-slice P04-S02-T002. Restore the deleted classes verbatim from 21859a4:frontend/src/features/auth/data/errors.ts (the two doc-block extension lines + the two new error-codes lines + lines ~263..450 covering both blocks) and verify the 49 baseline tsc errors and 40 pre-existing test failures collapse.",
