  "title": "generate ≥32-byte JWT dev key + default ENABLE_VERBOSE_LOGGING in dev .env",
  "description": "Two hygiene issues surfaced during P01-S02-T002 /verify-slice: (1) JWT_PRIVATE_KEY in .env is 'replace-with-dev-key' (20 bytes < 32, RFC 7518 §3.2 violation for HS256). tokens.py:62-73 emits a startup warning but does not fail. (2) ENABLE_VERBOSE_LOGGING is not declared in .env at all, so dev-restart.sh starts the backend with WARNING-level logging by default — verify-slice has to override it manually. Fix: extend scripts/setup-from-scratch.sh (or add a new scripts/gen-dev-secrets.sh) to (a) generate a 64-char random JWT_PRIVATE_KEY via 'python3 -c \"import secrets; print(secrets.token_urlsafe(48))\"' if the current value matches the placeholder pattern, (b) set ENABLE_VERBOSE_LOGGING=true in .env if missing, (c) document both behaviors in .env.example. Acceptance: clean clone + setup yields .env where JWT_PRIVATE_KEY length >= 32 and ENABLE_VERBOSE_LOGGING == 'true'.",
