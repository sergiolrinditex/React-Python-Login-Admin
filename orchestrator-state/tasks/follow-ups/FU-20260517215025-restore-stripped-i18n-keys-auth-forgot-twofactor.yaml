  "title": "Restore stripped i18n keys (auth.forgot/twoFactor/reset_sent + history namespace) — regression from commit 4a75d15",
  "description": "Commit 4a75d15 (P04-S01-T001 AdminDashboardPage) stripped frontend/src/i18n/index.ts from 744 LOC (baseline 21859a4) to 696 LOC, losing critical i18n keys for auth flows AND removing the entire top-level 'history' namespace. Subsequent admin/rag/mcp slices (0c91c03, df1e932, 3006416, 6a8efd9, 183232b, 7fac335) grew the file to 1629 LOC by adding admin-ai/rag/mcp namespaces but never restored the stripped keys. Concrete losses per language (×3 langs ES/EN/FR): (1) auth.forgot.* truncated from 18 to 4 lines (lost: titleHint, email, emailPlaceholder, submit, status.submitting, successFlash, actions.signIn, errors.{emailRequired, emailFormat, rateLimited, network, serverInternal}); (2) auth.twoFactor.* truncated from 21 to 4 lines (lost: titleHint, intro, codePlaceholder, submit, cta, status.submitting, errors.{codeRequired, codeFormat, invalidCode, challengeExpired, rateLimited, network, serverInternal, missingChallenge}, actions.backToSignIn); (3) auth.reset_sent.* entire sub-namespace gone (10 lines per lang); (4) history.* entire top-level namespace gone (includes row.openLabel with {{title}} interpolation). Impact: 26 vitest failures (of 499) — 11 in ForgotPasswordPage, 8 in TwoFactorPage, 4 in ResetSentPage, 3 in HistoryPage; raw i18n keys (e.g. 'twoFactor.titleHint', 'twoFactor.intro', 'history:row.openLabel') visible in the rendered DOM. tsc -b remains clean (strings don't cause type errors). In real browser, users see literal keys instead of translated copy — broken in production. Pattern is identical to the AuthRepository.ts strip from the same commit; this is the SECOND regression caused by 4a75d15 and is unrelated to the (now waived) FU about AuthRepository types. Discovered during /next-slice gate for P04-S01-T006 (which was a duplicate FU and got waived 2026-05-17T21:43Z).",
