  "title": "SQLAlchemy echo leaks argon2 hash in verbose logs (CWE-532)",
  "description": "When ENABLE_VERBOSE_LOGGING=true, sqlalchemy.engine.Engine logger emits SQL parameters including password_hash column values as raw argon2id strings (e.g. $argon2id$v=19$m=65536,t=3,p=4$...). Confirmed during /verify-slice for P01-S02-T001 (4 occurrences in back-verbose.log for V1+V2 sign-up runs). If verbose logs are shipped to a centralized aggregator (Datadog, ELK, CloudWatch) this leaks every user's argon2 hash to log readers. CWE-532 (Insertion of Sensitive Information into Log File). Per non-negotiable §Logging: 'Never log tokens, passwords, or PII' — argon2 hashes qualify as authentication-derived secrets. Tester originally flagged as low severity informal finding for P01-S02-T001; no YAML was filed. Promoting now to medium.",
  "journey_refs": [
    "J100"
  ],
  "screen_route": "—",
  "endpoint": "—",
