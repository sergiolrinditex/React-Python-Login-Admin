    "backend/app/core/db.py"
  ],
  "acceptance": [
    "ENABLE_VERBOSE_LOGGING=true must NOT emit raw password_hash values in any logger output. SQLAlchemy echo either disabled",
    "restricted to non-INSERT/UPDATE on auth tables",
    "or password_hash field redacted at logging layer. Test: grep '$argon2id$' on backend stdout during a sign-up flow returns 0."
  ],
  "verify": [
    "Run /verify-slice on a future auth slice with ENABLE_VERBOSE_LOGGING=true",
    "assert grep '$argon2id$' on back.log returns 0 across happy + duplicate paths."
  ],
  "notes": [
    "RESOLVED (P01-S02-T011, 2026-05-10): Root cause closed by P00-S02-T012 commit 4ccf7b0 (echo=False permanent on the singleton engine in backend/app/core/db.py). Acceptance branch 'SQLAlchemy echo disabled' is satisfied engine-wide. Regression test at backend/tests/integration/test_signup_no_argon2_hash_in_logs.py (T2 happy-path, T3 duplicate-409) asserts $argon2id$ is absent from both structlog stdout and sqlalchemy.engine handler records during ENABLE_VERBOSE_LOGGING=true sign-up flows. Belt-and-suspenders: 'password_hash' added to _REDACTED_KEYS in backend/app/core/logging.py (Variant B) covering the 'password_hash field redacted at logging layer' OR-branch of the acceptance criteria."
  ],
