  "title": "fix refresh cookie Path mismatch (/auth vs /api/v1/auth) across sign-in setter + refresh/logout consumers",
  "description": "Discovered during /verify-slice P01-S02-T004. _set_refresh_cookie in backend/app/auth/routers/_helpers.py sets path=\"/auth\" on the HttpOnly refresh cookie at sign-in (T002 debugger cycle 1 introduction, byte-identical in T003+T004). Actual endpoint URLs are /api/v1/auth/sign-in, /api/v1/auth/refresh, /api/v1/auth/logout (auth_router prefix=/auth × app.include_router prefix=/api/v1). Per RFC 6265 §5.4 a compliant browser will only send the cookie to URLs whose path starts with /auth/ — /api/v1/auth/* does NOT match, so the persisted refresh cookie is never transmitted back to refresh or logout endpoints. Backend correctly responds 401 no_cookie. Bug masked by TestClient/Starlette in tests because it does not enforce cookie Path attribute. Real-browser end-to-end auth chain (sign-in → use access → refresh → logout) cannot complete; the only currently-working path is to mint a fresh access via sign-in on each request.",
