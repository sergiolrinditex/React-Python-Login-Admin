    "why_not_debugger": "Fix changes _helpers._set_refresh_cookie path attribute, which is consumed identically by T002 sign-in (setter), T003 refresh (consumer), and T004 logout (consumer). A coordinated fix must re-verify T002 sign-in cookie still arrives at /api/v1/auth/refresh and /api/v1/auth/logout, T003 refresh still revokes+rotates, and reconcile TECHNICAL_GUIDE §10.2 (which does not currently pin a Path attribute; only HttpOnly Secure SameSite=Lax). Debugger inside T004 alone cannot mutate T002/T003 contracts and would silently change cookie attrs across the auth surface, which is the exact pattern this triage rule prevents.",
