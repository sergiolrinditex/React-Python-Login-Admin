  "title": "auth store: deduplicate concurrent refresh token calls on reload to prevent race-condition logout",
  "description": "On /chat reload, the frontend fires two simultaneous POST /auth/refresh requests with the same refresh_token cookie. First call succeeds and rotates the cookie (200, new Set-Cookie). Second call still carries the old revoked cookie and gets 401 AUTH_SESSION_EXPIRED, causing redirect to sign-in. User is logged out on every F5. Fix: singleton/mutex pattern in token refresh interceptor to ensure only one in-flight refresh at a time.",
