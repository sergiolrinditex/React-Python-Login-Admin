  "title": "Rate-limit public auth endpoints (sign-up, sign-in, reset)",
  "description": "P01-S02-T001 task-pack §13 R4 + 01-non-negotiables.md §Security ('Rate-limit public endpoints, especially auth') require rate-limiting on POST /api/v1/auth/sign-up and the rest of the public auth surface. Project has zero rate-limit middleware today (no slowapi, no fastapi-limiter in deps; verified via grep). T001 ships sign-up unprotected against brute-force / enumeration. Add slowapi (or equivalent) middleware with per-IP token bucket: sign-up 5/min/IP, sign-in 10/min/IP, password-reset 3/min/IP. Return 429 with Retry-After header. Belongs in P05 (Harden) but should be tracked NOW so it is not lost.",
