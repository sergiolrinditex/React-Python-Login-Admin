  "title": "Fix .env DATABASE_URL host port + pydantic env_file path resolution for native dev workflow",
  "description": "Two pre-existing infra issues surfaced during /verify-slice for P01-S01-T002. (1) .env DATABASE_URL points to host port 5432, but hilo-postgres exposes 5433 (5432 belongs to a different project's apn-postgres). Causes /ready=503 from a cold-boot native uvicorn and aborts dev-restart.sh --reset at db_reset. (2) pydantic-settings env_file=\".env\" is relative; when invoked from cd backend/ (Alembic, pytest), it cannot find the project-root .env and falls back to defaults (change-me password). Together these are the documented root cause of the persistent test_ready_returns_200_when_db_ok failure across multiple slices. Live compose stack is unaffected (compose env_file: .env resolves at project root). Out of scope for the rename slice; tracking here so it does not perpetuate.",
