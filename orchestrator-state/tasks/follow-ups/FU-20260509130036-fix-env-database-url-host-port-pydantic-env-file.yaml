  "acceptance": [
    "(1) DATABASE_URL host:port aligned to hilo-postgres exposure (localhost:5433 for native dev or postgres:5432 for compose)",
    ".env.example documents both modes clearly. (2) Settings env_file resolves robustly regardless of cwd (e.g. absolute path resolution from the project root",
    "or env_file as a list with project-root anchor",
    "or pydantic-settings model_config.env_file with explicit Path). (3) Cold-boot native uvicorn from project root + native pytest from cd backend/ both report /ready 200 against hilo-postgres. (4) dev-restart.sh --reset succeeds end-to-end on a clean checkout. (5) test_ready_returns_200_when_db_ok turns from FAIL to PASS without any test-side change."
  ],
  "verify": [
    "Run from a fresh shell with no env vars set: 1) bash scripts/dev-restart.sh --reset succeeds. 2) cd backend && pytest tests/test_health.py::test_ready_returns_200_when_db_ok passes. 3) Cold-boot uvicorn from project root: curl /ready returns 200 with checks.db.status=ok. 4) Run pytest from project root AND cd backend/ — Settings.database_url loaded with the right credentials in both cases."
