  "title": "Add bash -n .env.example pre-commit/CI lint to prevent placeholder regression",
  "description": "Discovered during /verify-slice P00-S02-T013 (R1). The fix in T013 replaced 11 angle-bracket placeholders so 'set -a; source .env; set +a' succeeds. There is no automated guard preventing a future dev from adding a new variable with shell metacharacters (<, >, |, (, ), unquoted) and silently breaking 'source .env' on the next clean clone. Mitigation is a one-line bash -n check on .env.example in pre-commit (or CI lint) so any future regression is caught before merge. Out of T013 write_set (T013 only allowed editing .env.example itself).",
  "journey_refs": [],
  "screen_route": "—",
  "endpoint": "—",
  "tables": [],
  "depends_on": [
    "P00-S02-T013"
  ],
  "conflict_groups": [
    "dev_env_setup"
  ],
  "write_set": [
    ".pre-commit-config.yaml",
    ".github/workflows/"
  ],
  "acceptance": [
    "Pre-commit hook (or CI lint job",
    "or both) executes 'bash -n .env.example' on every PR/commit that touches .env.example",
    "fails the check on non-zero exit. Hook config is committed to the repo so it is active for all developers without manual setup."
  ],
  "verify": [
    "1) Introduce a deliberate regression in .env.example (e.g. NEWVAR=<broken>) on a feature branch",
    "2) Run pre-commit (or push and watch CI)",
    "3) Confirm the check fails with non-zero exit and a clear message",
    "4) Revert the regression and confirm the check passes again."
  ],
  "notes": [
    "Severity low: regression cost is one dev hitting it on first 'bash scripts/setup-from-scratch.sh' on a fresh clone. Discovered as R1 in T013 verify-slice."
  ],
