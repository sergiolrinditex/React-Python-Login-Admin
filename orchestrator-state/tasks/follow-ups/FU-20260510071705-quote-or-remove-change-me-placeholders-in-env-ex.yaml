  "title": "Quote or remove <change-me> placeholders in .env.example to fix bash source on fresh clones",
  "description": "Discovered in /verify-slice P00-S02-T011 reproduction. .env.example has 3 lines with angle-bracket placeholders that bash interprets as redirection during 'source .env', causing 'No such file or directory' aborts: (1) DATABASE_URL=postgresql+asyncpg://hilopeople:<change-me>@localhost:5433/hilopeople_dev (line 58); (2) JWT_PRIVATE_KEY=<dev-rsa-private-key-pem-placeholder> (line 75); (3) JWT_PUBLIC_KEY=<dev-rsa-public-key-pem-placeholder> (line 76); plus RESEND_API_KEY=<change-me> (low). T011 implicitly claimed 'fresh dev clone after running setup-from-scratch.sh has a valid Fernet ENCRYPTION_KEY in .env' — that AC is met, but the broader 'bootstrap_verification_data succeeds without manual export' AC requires the .env to be sourceable by bash. Currently a fresh clone needs manual editing of these placeholders before the dev workflow works end-to-end. Common fix: single-quote the values ('<change-me>') so bash treats them as strings, or replace <...> with values that don't include shell metacharacters, or comment lines until P01-S02-T001 populates real RSA keys.",
  "journey_refs": [
