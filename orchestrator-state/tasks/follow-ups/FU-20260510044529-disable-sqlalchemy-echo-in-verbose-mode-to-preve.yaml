  "title": "Disable SQLAlchemy echo in verbose mode to prevent Fernet token exposure in logs",
  "description": "When ENABLE_VERBOSE_LOGGING=true, db.py sets echo=settings.enable_verbose_logging which causes SQLAlchemy to log all SQL parameters including Fernet-encrypted secrets (gAAAAA tokens). While these are ciphertext and not plaintext API keys, they violate the defense-in-depth CWE-532 posture. Fix: set echo=False permanently or use a custom event listener that redacts bind parameters for sensitive tables.",
