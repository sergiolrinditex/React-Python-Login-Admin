  "title": "fix dev-restart db_health race: wait for host TCP, not container-internal pg_isready",
  "description": "After 'compose down -v && compose up postgres', the existing wait_for db_health uses pg_isready inside the container. Container reports ready before Rancher (or vanilla docker) finishes forwarding port 5432 to the host. alembic upgrade then connects from the host and gets ECONNREFUSED. Observed during /verify-slice run of P01-S02-T008: run-1 (clean cold) succeeded; run-2 (back-to-back hard reset) failed at alembic step with sqlalchemy.exc.OperationalError: connection failed: connection to server at \"127.0.0.1\", port 5432 failed: Connection refused. Run-3 (postgres already healthy, no down) succeeded. The hard-fail behavior installed by T008 makes this race visible (good), but the underlying timing fix is out-of-scope for T008. Suggested fix shape: in db_health (line 153) or a new wait_for_host_tcp helper, after pg_isready-internal succeeds, also poll a host-side connection (e.g. nc -z 127.0.0.1 5432 with credential probe via psycopg or pg_isready -h 127.0.0.1) for up to 30s before returning success. Same file (scripts/dev-restart.profile.sh) so conflict_group is the same (tooling:dev-restart) — must NOT run in parallel with T008 itself, but T008 is closing now.",
