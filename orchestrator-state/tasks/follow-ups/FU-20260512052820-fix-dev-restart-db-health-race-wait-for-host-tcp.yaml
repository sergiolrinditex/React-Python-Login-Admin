  "triage": {
    "scope_classification": "out_of_scope",
    "why_not_debugger": "T008 acceptance is narrowly the seed --source path (lines 347-360 of scripts/dev-restart.profile.sh). The race lives in db_health() (lines 153-157) which runs pg_isready INSIDE the postgres container; meanwhile alembic upgrade head connects from the HOST at 127.0.0.1:5432 — container-internal-ready and host-TCP-forward-ready are different timings under Rancher. Two-consecutive --reset can race between compose down -v + compose up + alembic. T008 fix did not introduce this race (seed block runs after alembic), but T008's hard-fail correctly surfaces it as RESET2_EXIT=1. Bundling a wait-for-host-tcp into T008 would expand its responsibility from one bug to two unrelated bugs (KISS/YAGNI violation per .claude/rules/01-non-negotiables.md). Needs its own slice with separate acceptance: db_health (or a new wait_for_host_tcp helper) must verify host TCP 5432 reachability with credentials before returning success.",
