  "title": "Disable structlog Rich-traceback show_locals globally to prevent DSN/secret leaks in error logs",
  "description": "Verify-slice for P00-S02-T002 found that any _logger.error(..., exc_info=True) call leaks Python frame locals into stdout via structlog's Rich RichTracebackFormatter. The /ready 503 path leaked the full asyncpg DSN (host, port, user, password) 14+ times in a single 503 log. Root cause is in app/core/logging.py (T003) — the structlog ConsoleRenderer / RichTracebackFormatter is not configured with show_locals=False, and the existing redaction processor only scrubs top-level event_dict keys, not traceback frame locals. T002 closes the immediate leak in router.py + main.py by removing exc_info=True from those two log calls (in-scope debugger fix). This follow-up addresses the architectural root cause: any future error log with exc_info=True (in any feature) will leak again. CWE-532. Violates 01-non-negotiables.md §Logging and §Security.",
  "journey_refs": [],
  "screen_route": "—",
  "endpoint": "—",
