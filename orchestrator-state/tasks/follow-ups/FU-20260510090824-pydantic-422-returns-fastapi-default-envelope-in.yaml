  "title": "Pydantic 422 returns FastAPI default envelope instead of project errors envelope",
  "description": "TECHNICAL_GUIDE §6.2 specifies project-wide error envelope { data, meta, errors[{code, message, field, details}] }. Business-rule errors (AUTH_WEAK_PASSWORD, AUTH_LEGAL_ACCEPTANCE_REQUIRED, AUTH_NON_CORPORATE_EMAIL, AUTH_EMAIL_TAKEN) correctly use this envelope. Pydantic-level validation errors (RequestValidationError — missing email field, malformed email format) leak the FastAPI default envelope { detail: [{type, loc, msg, input}] }. Verified during /verify-slice P01-S02-T001 — T5 (missing email) and T6 (invalid email) return the wrong shape. Frontend SignUpPage (P03-S01-T002) will need to handle two distinct error shapes, doubling client-side error mapping logic. Fix: add a global FastAPI exception_handler(RequestValidationError) that re-shapes Pydantic errors into the project envelope with synthesized error codes (e.g. AUTH_VALIDATION_ERROR or per-field codes).",
