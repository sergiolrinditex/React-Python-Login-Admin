  "title": "Suppress httpx logger to prevent Gemini API key leak in verbose logs",
  "description": "When ENABLE_VERBOSE_LOGGING=true, the httpx library emits INFO-level logs of HTTP requests including the full URL. For GeminiDirectClient, the URL contains the api_key as a query param (?key=AIza...). The app code uses _safe_base_url() to strip this from app-level logs, but httpx's own transport logger bypasses it. Fix: set logging.getLogger('httpx').setLevel(logging.WARNING) in configure_logging() when verbose=False (already correct since root is WARNING) and also when verbose=True (add explicit httpx logger suppression). Alternatively, configure httpx event hooks to scrub the key from request logs.",
