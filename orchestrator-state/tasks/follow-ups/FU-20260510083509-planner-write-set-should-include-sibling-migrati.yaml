  "title": "Planner write_set should include sibling migrations when inserting a new Alembic revision N between existing revisions",
  "description": "T005 had to modify 0003_admin_ai_providers_models.py outside its declared write_set to keep a single Alembic head when inserting new revision 0002 between 0001 and 0003. 0003 was deliberately designed for this (its docstring lines 24-29 reserved revision 0002), but the planner did not include 0003 in T005's write_set. Generic rule for future Alembic-driven slices: when bootstrap_three_docs / planner sees a 'new migration N+1 is inserted before the current head' shape, write_set MUST include the sibling that currently points at the same down_revision. This avoids labelling mechanically-required edits as WRITE_SET_DRIFT and gives the validator a clean scope check. Could be a planner heuristic or a check in scripts/check-task-dag.sh.",
