  "title": "make bootstrap_three_docs.py --refresh preserve closer-set task status",
  "description": "bootstrap_three_docs.py --refresh, when re-run after a slice closer has committed, overwrites the 'done' status (and last_outcome/last_updated_by/last_stop_at) back to the registry-template defaults (ready_for_close / ready). The refresh message says 'Runtime state preserved by default (62 matching task(s))' but the diff shows fields like status, last_outcome, last_updated_by being reset. Manifested for P01-S02-T002 when STACK_PROFILE.yaml was changed and bootstrap --refresh was run for propagation: T002 status flipped from 'done' to 'ready_for_close' despite the closer's atomic commit being merged to main. Fix: in the registry merger, when a task already exists with status in {done, blocked, skipped} and last_outcome in {committed, deployed}, do NOT overwrite those lifecycle fields — only update title/depends_on/conflict_groups/write_set/journey_refs/acceptance derived from the Coverage Registry. Add a regression test under .claude/bin/tests/ that creates a registry with status=done and asserts --refresh preserves it.",
