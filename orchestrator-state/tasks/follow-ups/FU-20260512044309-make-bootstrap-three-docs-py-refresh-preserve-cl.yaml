    "why_not_debugger": "Bug lives in the orchestrator framework (.claude/bin/bootstrap_three_docs.py + supporting modules), not in any app slice Write set. The bug only manifests when bootstrap_three_docs.py --refresh runs on a registry that has tasks at status=done from recent closers — refresh regenerates task records and resets the status to ready_for_close. I patched the registry manually for T002 (commit 570b702) but the root cause persists for any future refresh. Debugger inside T002 cannot fix orchestrator framework code without expanding Write set across the entire .claude/ static config.",
