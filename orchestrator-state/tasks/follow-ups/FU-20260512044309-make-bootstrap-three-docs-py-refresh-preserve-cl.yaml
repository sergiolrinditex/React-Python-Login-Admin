  ],
  "acceptance": [
    "bootstrap_three_docs.py --refresh on a registry where a task has status=done + last_outcome=committed leaves those two fields unchanged. A new pytest under .claude/bin/tests/ enforces this for all closer-final statuses. Manual patch of registry.json after refresh is no longer needed."
  ],
  "verify": [
    "Set task P01-S02-T001.status=done in registry.json. Run python3 -B -S .claude/bin/bootstrap_three_docs.py --refresh. Assert: (a) refresh exits 0",
    "(b) git diff registry.json shows the task's status",
    "last_outcome",
    "last_updated_by",
    "last_stop_at unchanged",
    "(c) the new pytest test_bootstrap_refresh_preserves_done_status passes."
  ],
