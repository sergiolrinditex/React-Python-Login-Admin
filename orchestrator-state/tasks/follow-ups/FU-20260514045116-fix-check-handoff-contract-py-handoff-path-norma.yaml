  "title": "Fix check_handoff_contract.py: handoff path normalization fails from worktree cwd (wrapper masks exit code)",
  "description": "scripts/check-handoff-contract.sh invokes .claude/bin/check_handoff_contract.py which calls Path(handoff_abs).relative_to(project_root()). project_root() resolves to the canonical main repo, but when the caller cwd is a git worktree, the handoff file path passed in is also from the worktree, causing ValueError 'is not in the subpath of'. The bash wrapper does not propagate exit code (or uses set -e on python3 but Python's SystemExit(traceback) returns 1 → wrapper's last command was tail or pipe which masks PIPESTATUS, end exit 0). Net effect: closer/verify-slice pre-checks 'pass' silently from worktree, defeating the gate. This was tracked as FU-20260513201402-fix-check-handoff-contract-py-worktree-path-bug- but the YAML was drift-removed by the reconciler (yaml_missing). Re-registering with full triage.",
