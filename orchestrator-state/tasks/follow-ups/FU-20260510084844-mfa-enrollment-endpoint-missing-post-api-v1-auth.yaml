  "title": "MFA enrollment endpoint missing — POST /api/v1/auth/2fa/enroll (TOTP secret generation)",
  "description": "Task-pack §9 D3 R5 + §13 R5: TECHNICAL_GUIDE §6.2 declares POST /api/v1/auth/2fa/verify (T006) but NO endpoint that generates+persists the TOTP secret with QR. mfa_totp_secrets.secret_encrypted is NOT NULL — verify cannot work without enrollment first. T001 sign-up returns mfa_required=true and the frontend is supposed to navigate to /auth/2fa, but until enrollment exists the user is stuck. Need POST /api/v1/auth/2fa/enroll: generates 32-byte TOTP secret, Fernet-encrypts via app.core.security.encrypt_secret, INSERTs into mfa_totp_secrets, returns {data:{otpauth_url, qr_png_base64, recovery_codes:[...]}}. Audit-log on success.",
