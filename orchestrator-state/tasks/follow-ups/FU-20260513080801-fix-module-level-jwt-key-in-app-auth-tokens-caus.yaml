  "title": "Fix module-level _JWT_KEY in app.auth.tokens causing JWT decode failures in full-suite ordering",
  "description": "backend/app/auth/tokens.py captures JWT_PRIVATE_KEY as a module-level constant at import time. When pytest collects the full test suite, import order causes _JWT_KEY to be empty for some test modules that run after it was first cached as empty. TestGetMeSecurityShape T27/T28/T29 fail when run under full-suite or acceptance gate ordering (they pass in isolation). The fix is to make _JWT_KEY a lazy getter (lru_cache or property) in app/auth/tokens.py, exactly as the P02-S02-T001 debugger did for test_security.py but applied to the production code.",
