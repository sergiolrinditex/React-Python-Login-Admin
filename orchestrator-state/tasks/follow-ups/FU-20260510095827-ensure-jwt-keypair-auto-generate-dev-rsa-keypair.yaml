  "title": "ensure_jwt_keypair: auto-generate dev RSA keypair in setup-from-scratch.sh",
  "description": "Discovered during /verify-slice P00-S02-T013 (R3). The fresh-clone dev workflow auto-generates ENCRYPTION_KEY via setup-from-scratch.sh::ensure_encryption_key but does NOT auto-generate a JWT keypair. JWT_PRIVATE_KEY/JWT_PUBLIC_KEY in .env.example are literal placeholders ('dev-rsa-private-key-pem-placeholder' after T013) that pydantic-settings accepts as SecretStr at startup but will fail at runtime when sign-up/sign-in tries to sign or verify a JWT (PEM parse error). T013 did not introduce this — it is pre-existing behavior documented in .env.example lines 65-72 expecting the human dev to run openssl genrsa manually. With sign-up already implemented (P01-S02-T001 commit 04914a9) and sign-in (P01-S02-T002) imminent, this becomes an actual blocker for journey J100 verification on any fresh clone. Add an ensure_jwt_keypair function analogous to ensure_encryption_key: detect placeholder values, run 'openssl genrsa -out .keys/jwt_private.pem 4096' + 'openssl rsa -in .keys/jwt_private.pem -pubout -out .keys/jwt_public.pem' (or PEM-as-string in .env), inject the result into .env, and update .env.example to document the new placeholders/format if needed.",
  "journey_refs": [
    "J100"
  ],
  "screen_route": "—",
  "endpoint": "—",
  "tables": [],
  "depends_on": [
    "P00-S02-T013"
  ],
  "conflict_groups": [
    "dev_env_setup"
  ],
  "write_set": [
    "scripts/setup-from-scratch.sh",
    ".env.example"
  ],
  "acceptance": [
    "After 'rm .env",
    "bash scripts/setup-from-scratch.sh' on a fresh clone",
    ".env contains a real RSA keypair (PEM blocks with -----BEGIN/-----END markers",
    "valid 2048+ bits) for JWT_PRIVATE_KEY and JWT_PUBLIC_KEY",
    "AND backend startup loads them without error AND POST /api/v1/auth/sign-up issues a token signable by JWT_PRIVATE_KEY and verifiable by JWT_PUBLIC_KEY end-to-end. Idempotent: re-running setup-from-scratch.sh on an existing valid keypair leaves it untouched (matcher logic analogous to ensure_encryption_key)."
  ],
  "verify": [
    "1) rm .env",
    "rm -f .keys/jwt_*.pem (or wherever the new function stores them)",
    "2) bash scripts/setup-from-scratch.sh",
    "3) grep -E '^JWT_PRIVATE_KEY=' .env | head -1 → must contain a real PEM (or path to one)",
    "4) bash scripts/dev-restart.sh --reset",
    "5) curl -X POST /api/v1/auth/sign-up with a real test user",
    "expect 201 + JWT in response",
    "6) Decode the JWT header (jwt.io or jwt-cli) and confirm RS256 algorithm",
    "7) Re-run setup-from-scratch.sh",
    "confirm idempotency log line."
  ],
  "notes": [
    "Severity medium because it BLOCKS P01-S02-T002 (sign-in/JWT issuance) on fresh clones. Pre-existing behavior — T013 inherits but does not introduce. Analogous to ensure_encryption_key auto-gen pattern already in setup-from-scratch.sh:99-115. Discovered as R3 in T013 verify-slice."
  ],
