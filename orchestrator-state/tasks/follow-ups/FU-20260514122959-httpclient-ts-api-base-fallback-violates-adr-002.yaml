  "acceptance": [
    "Change httpClient.ts line 34 from `?? \"http://localhost:8000\"` to `?? \"\"` (same fix as authRepository.ts P03-S01-T002). All existing tests still pass. Browser flow to GET /api/v1/users/me uses relative URL /api/v1/users/me and goes through Vite proxy (dev) / Nginx (prod) per ADR-002. No CORS preflight."
