  "title": "httpClient.ts API_BASE fallback violates ADR-002 same-origin contract",
  "description": "frontend/src/features/auth/data/httpClient.ts line 34 has the same defect already fixed in authRepository.ts for T002: const API_BASE = import.meta.env.VITE_API_BASE_URL ?? \"http://localhost:8000\". The hardcoded fallback triggers cross-origin XHR from :5173 → :8000 when VITE_API_BASE_URL is unset, breaks the SameSite=Lax cookie contract documented in ADR-001, and violates ADR-002 same-origin / reverse-proxy topology declared in frontend/.env.example. Pre-existing since commit 100867a (P01-S03-T001 — Auth state provider). Affects ALL authenticated browser flows (GET /api/v1/users/me, refresh, logout). Detected by slice-verifier during /verify-slice P03-S01-T002 alongside the sibling authRepository.ts defect that WAS in T002 write_set and has been fixed.",
