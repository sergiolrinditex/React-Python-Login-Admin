# STACK_PROFILE.yaml — Declarative stack profile
# Replace every value with the real stack. This file is source-of-truth for paths, commands, token enforcer and git workflow.
profile_version: stack-profile-v1
frontend:
  language: {{frontend_language}}              # dart | typescript | swift | kotlin | none
  framework: {{frontend_framework}}            # flutter | nextjs | react | swiftui | none
  module_root: {{frontend_module_root}}        # app/lib | web/src | ios/App | none
  theme_root: {{frontend_theme_root}}          # app/lib/core/theme | web/src/theme | none
  test_cmd: {{frontend_test_cmd}}              # flutter test | pnpm test | npm test | none
  dev_cmd: {{frontend_dev_cmd}}                # flutter run -d chrome | pnpm dev | none
  visual_check: {{visual_check}}               # browser | emulator | simulator | device | tui | none
backend:
  language: {{backend_language}}               # python | typescript | go | none
  framework: {{backend_framework}}             # fastapi | express | nestjs | none
  module_root: {{backend_module_root}}         # api/src | server/src | none
  test_cmd: {{backend_test_cmd}}               # pytest | pnpm test | go test ./... | none
  dev_cmd: {{backend_dev_cmd}}                 # uvicorn ... | pnpm dev | none
  health_url: {{backend_health_url}}           # http://localhost:8000/health | none
db:
  engine: {{db_engine}}                        # postgres | sqlite | mysql | none
  migrate_cmd: {{db_migrate_cmd}}              # alembic upgrade head | prisma migrate deploy | none
  seed_cmd: {{db_seed_cmd}}                    # python -m ... | pnpm seed | none
git_workflow: {{git_workflow}}                 # push-to-main/direct-main | pr-flow | gitflow
design_tokens_enforcer: {{design_tokens_enforcer}} # design_tokens_v1 | none | <project_plugin>
